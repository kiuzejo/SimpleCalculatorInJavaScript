<!DOCTYPE html>
<html lang="en">



<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">

    <title>Calculator</title>
</head>

<body>
    <div class="background">

        <h1 class="titulo2">HP Prime Calculator</h1>

        <div class="calculadora">
            <h2 class="titulo1">Best calculadora</h2>
            <p id="tela"></p>
            <div class="boton_table">
 <!-- linea 1 -->
                <button class="numero" onclick="delete_all()">C</button>
                <button class="numero" onclick="delete_caracter()">◁</button>
                <button class="numero" onclick="insert('÷')">÷</button>
                <button class="numero" onclick="insert('×')">×</button>
<!--//linea 2// -->
                <button class="numero" onclick="insert('7')">7</button>
                <button class="numero" onclick="insert('8')">8</button>
                <button class="numero" onclick="insert('9')">9</button>
                <button class="numero" onclick="insert('+')">+</button>
<!--//linea 3//-->
                <button class="numero" onclick="insert('4')">4</button>
                <button class="numero" onclick="insert('5')">5</button>
                <button class="numero" onclick="insert('6')">6</button>
                <button class="numero" onclick="insert('-')">-</button>
<!--//linea 4//-->
                 <button class="numero" onclick="insert('1')">1</button>
                <button class="numero" onclick="insert('2')">2</button>
                <button class="numero" onclick="insert('3')">3</button>
                <button class="numero igual" onclick="calcularResultado()">=</button>
<!--//linea 5//-->
                <button class="numero cero" onclick="insert('0')">0</button>
                <button class="numero" onclick="insert(',')">,</button> 
                

            </div>
        </div>

    </div>

    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

</body>

</html>
